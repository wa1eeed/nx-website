server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml application/xml;

    # CSS/JS — must revalidate every load so design/script updates
    # appear immediately. They carry a ?v= query for hard busting too.
    # (regex locations are matched before the /assets/ prefix block)
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Fonts & images rarely change — cache them hard.
    location ~* \.(?:woff2?|ttf|otf|eot|png|jpe?g|gif|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # HTML pages — never cache stale markup. Clean routing supports
    # both /en/projects.html and the extension-less /en/projects.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri.html $uri/ =404;
    }
}
