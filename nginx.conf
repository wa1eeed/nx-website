server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Canonical clean URLs: 301 any .html → extensionless path ----
    # /en/contact.html → /en/contact ; /en/index.html → /en/ ; /index.html → /
    if ($request_uri ~* "^/(.*/)?index\.html($|\?)") { return 301 /$1; }
    if ($request_uri ~* "^/(.+)\.html($|\?)")        { return 301 /$1; }

    # ---- IA swap (2026-06): Sectors moved /solutions/* → /sectors/* ;
    #      Solutions (platform types) moved /platforms/* → /solutions/* ----
    rewrite ^/(en|ar)/solutions/(fintech|proptech|insurtech|healthtech|logistics|ecommerce|on-demand)(/.*)?$ /$1/sectors/$2$3 permanent;
    rewrite ^/(en|ar)/platforms/(.*)$ /$1/solutions/$2 permanent;

    # gzip for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml application/xml;

    # NOTE: nginx add_header does NOT merge across blocks, so each
    # location re-declares the headers it needs.

    # CSS/JS — revalidate every load; they carry a ?v= for hard busting.
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Fonts, images & video rarely change — cache them hard.
    location ~* \.(?:woff2?|ttf|otf|eot|png|jpe?g|gif|svg|webp|ico|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # HTML pages — never cache stale markup; clean extensionless routing
    # (/en/contact → en/contact.html, /en/work/ → en/work/index.html).
    location / {
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri.html $uri/ =404;
    }
}
