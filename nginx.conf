server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml application/xml;

    # Long cache for fingerprint-free static assets, but keep HTML fresh
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~* \.(?:css|js|woff2?|png|jpe?g|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # HTML pages — never cache stale markup. Clean routing supports
    # both /en/projects.html and the extension-less /en/projects.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri.html $uri/ =404;
    }
}
